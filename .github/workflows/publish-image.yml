# Build + push the iaiops OCI image(s) to GHCR — one per edition profile, multi-arch — then
# cosign-sign the images and attach the SIGNED Margo application package (descriptor +
# deploy-ready compose) to the GitHub release.
#
# The image installs the PUBLISHED PyPI wheel (deploy/margo/Dockerfile), and the release flow
# pushes the tag BEFORE the wheel lands on PyPI. That race is guarded in TWO places, because it
# has two distinct failure modes:
#
#   1. `wait-for-pypi` — polls the SIMPLE index (what pip resolves against; the JSON API updates
#      first and lying about it broke v0.15.0) until the version is published at all. This race
#      broke v0.12.0–v0.14.0.
#   2. per-runner `Pre-flight` in `build` — the gate job runs on a DIFFERENT runner and therefore
#      a different CDN edge, so it cannot speak for the five parallel build runners. v0.18.0
#      proved it: the gate passed, four profiles built, and `building` still failed with "No
#      matching distribution". Each build runner now resolves the version itself, with pip,
#      before building. That replaced a blind 60s sleep — a guess at propagation time — with an
#      actual precondition checked where the failure lands.
#
# Triggers:
#   - push a tag  vX.Y.Z            → builds images for version X.Y.Z
#   - manual (workflow_dispatch)    → builds images for the `version` input
#
# Results:
#   ghcr.io/industrial-aiops/iaiops:<version>-<profile>   (+ factory also <version> and latest)
#   — each image cosign-signed with the repo key (public key: deploy/margo/cosign.pub)
#   release asset iaiops-margo-package-<version>.tar.gz (+ .sig)
#
# Verify:
#   cosign verify --key deploy/margo/cosign.pub ghcr.io/industrial-aiops/iaiops:<version>-<profile>
#   cosign verify-blob --key cosign.pub --signature <pkg>.sig <pkg>
name: publish-image

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: "iaiops version to bake in (must already be on PyPI)"
        required: true

permissions:
  contents: write # upload the signed Margo package to the release
  packages: write

env:
  IMAGE: ghcr.io/industrial-aiops/iaiops

jobs:
  # The release flow tags first, publishes the wheel second — poll PyPI so the image build
  # starts only once `iaiops==<version>` is actually installable (up to 30 min).
  wait-for-pypi:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            v="${GITHUB_REF_NAME#v}"          # v0.14.0 -> 0.14.0
          else
            v="${{ github.event.inputs.version }}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Wait until iaiops==<version> is installable from PyPI
        run: |
          v="${{ steps.ver.outputs.version }}"
          # Poll the SIMPLE index (what pip actually resolves against), not the JSON
          # API — the JSON API updates first, and the v0.15.0 release proved a stale
          # simple-index CDN edge can still fail `pip install` after the JSON API is
          # already serving the version.
          # This job proves the wheel was PUBLISHED. It cannot prove the wheel is
          # visible to the OTHER runners: each build runner resolves through its own
          # CDN edge, and v0.18.0 proved one can still be stale after this job has
          # seen the version (4 of 5 profiles built; `building` failed with "No
          # matching distribution"). A blind sleep here was a guess at propagation
          # time; the per-runner pre-flight in the build job replaces it with an
          # actual precondition checked where the failure lands.
          for i in $(seq 1 60); do
            if curl -fsS "https://pypi.org/simple/iaiops/" 2>/dev/null | grep -q "iaiops-${v}"; then
              echo "iaiops ${v} is on the PyPI simple index (attempt ${i})."
              exit 0
            fi
            echo "iaiops ${v} not on the simple index yet (attempt ${i}/60) — sleeping 30s…"
            sleep 30
          done
          echo "::error::iaiops ${v} never appeared on PyPI within 30 min — publish the wheel, then re-run (workflow_dispatch with version=${v})."
          exit 1

  build:
    needs: wait-for-pypi
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [fab, factory, process, building, water]
    steps:
      - uses: actions/checkout@v4

      - name: Compute tags
        id: tags
        run: |
          v="${{ needs.wait-for-pypi.outputs.version }}"
          p="${{ matrix.profile }}"
          tags="${IMAGE}:${v}-${p}"
          # The factory profile is the default edition — also publish bare version + latest.
          if [ "$p" = "factory" ]; then
            tags="${tags},${IMAGE}:${v},${IMAGE}:latest"
          fi
          echo "tags=$tags" >> "$GITHUB_OUTPUT"

      # Per-runner pre-flight. The wait-for-pypi job ran on a DIFFERENT runner and
      # therefore a different CDN edge; this one is what the build's `pip install`
      # will actually resolve through. Uses a real pip resolution rather than a
      # curl of the index, because pip is what fails: `pip download --no-deps` is
      # the cheapest thing that exercises the same resolver path.
      #
      # Without this, v0.18.0 lost one profile of five to a stale edge and needed a
      # manual re-run — with the signed margo package skipped as collateral.
      - name: Pre-flight — this runner can resolve iaiops==<version>
        run: |
          v="${{ needs.wait-for-pypi.outputs.version }}"
          for i in $(seq 1 20); do
            if pip download --no-deps --quiet --dest /tmp/preflight "iaiops==${v}" 2>/dev/null; then
              echo "iaiops ${v} resolves from this runner (attempt ${i})."
              rm -rf /tmp/preflight
              exit 0
            fi
            echo "not resolvable from this runner yet (attempt ${i}/20) — sleeping 30s…"
            sleep 30
          done
          echo "::error::iaiops ${v} is on the index but did not become resolvable from this runner within 10 min (stale CDN edge). Re-run this job."
          exit 1

      - uses: docker/setup-qemu-action@v3 # arm64 emulation
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/margo/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            PROFILE=${{ matrix.profile }}
            IAIOPS_VERSION=${{ needs.wait-for-pypi.outputs.version }}
          tags: ${{ steps.tags.outputs.tags }}
          push: true
          provenance: false

      - uses: sigstore/cosign-installer@v3

      - name: Cosign-sign the pushed image (by digest)
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY \
            "${IMAGE}@${{ steps.push.outputs.digest }}"

  # The Margo application package: descriptor + deploy-ready compose, tarred, cosign-signed,
  # attached to the GitHub release. This is what margo.yaml's packageLocation points at; the
  # public verify key is deploy/margo/cosign.pub (keyLocation).
  margo-package:
    needs: [wait-for-pypi, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: sigstore/cosign-installer@v3

      - name: Assemble + sign the application package
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          v="${{ needs.wait-for-pypi.outputs.version }}"
          pkgdir="iaiops-margo-package-${v}"
          mkdir "${pkgdir}"
          cp deploy/margo/margo.yaml "${pkgdir}/margo.yaml"
          # The deploy-ready compose ships as `compose.yaml` inside the package.
          cp deploy/margo/package.compose.yaml "${pkgdir}/compose.yaml"
          cp deploy/margo/cosign.pub "${pkgdir}/cosign.pub"
          tar -czf "${pkgdir}.tar.gz" "${pkgdir}"
          cosign sign-blob --yes --key env://COSIGN_PRIVATE_KEY \
            --output-signature "${pkgdir}.tar.gz.sig" "${pkgdir}.tar.gz"

      - name: Attach package + signature to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          v="${{ needs.wait-for-pypi.outputs.version }}"
          gh release upload "v${v}" \
            "iaiops-margo-package-${v}.tar.gz" \
            "iaiops-margo-package-${v}.tar.gz.sig" \
            --clobber --repo "${{ github.repository }}"

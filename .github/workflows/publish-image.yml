# Build + push the iaiops OCI image(s) to GHCR — one per edition profile, multi-arch.
# The image installs the PUBLISHED PyPI wheel (deploy/margo/Dockerfile), so publish to PyPI first,
# then tag (or run manually). No local Docker needed — the build happens in CI.
#
# Triggers:
#   - push a tag  vX.Y.Z            → builds images for version X.Y.Z
#   - manual (workflow_dispatch)    → builds images for the `version` input (default 0.10.1)
#
# Result: ghcr.io/industrial-aiops/iaiops:<version>-<profile> (+ factory also tagged <version> and latest).
name: publish-image

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: "iaiops version to bake in (must already be on PyPI)"
        required: true
        default: "0.10.1"

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/industrial-aiops/iaiops

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [fab, factory, process, building, water]
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            v="${GITHUB_REF_NAME#v}"          # v0.11.0 -> 0.11.0
          else
            v="${{ github.event.inputs.version }}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Compute tags
        id: tags
        run: |
          v="${{ steps.ver.outputs.version }}"
          p="${{ matrix.profile }}"
          tags="${IMAGE}:${v}-${p}"
          # The factory profile is the default edition — also publish bare version + latest.
          if [ "$p" = "factory" ]; then
            tags="${tags},${IMAGE}:${v},${IMAGE}:latest"
          fi
          echo "tags=$tags" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3        # arm64 emulation
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/margo/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            PROFILE=${{ matrix.profile }}
            IAIOPS_VERSION=${{ steps.ver.outputs.version }}
          tags: ${{ steps.tags.outputs.tags }}
          push: true
          provenance: false

# Margo ApplicationDescription for iaiops — built to the REAL margo.org/v1-alpha1 schema
# (docs.margo.org, PR1 pre-draft). This is no longer a blind guess: the structure, field names,
# and validators below follow the published Application Description spec.
#
# WG feedback resolved (app-package-definition-wg, 2026-07-13, ABB / P. Presson — Discourse t/43):
#   • Runtime shape — OUT of Margo's scope; socket transport recommended. This descriptor now
#     targets the socket (streamable-http) transport (one container port); see compose.yaml.
#   • Profiles — either idiom is valid; we keep ONE parameterised application (the `profile` param),
#     not N packages.
#   • Secrets — the spec has NO secret-typed parameter YET; tracked at margo/specification#145.
#     iaiops's model differs from both proposals there: the deploy config carries only a secret
#     NAME/reference, never a value — resolved on-device from the encrypted secret store. See
#     `masterPassword` below and ../../docs/MARGO-ALIGNMENT.md appendix B.
#
# Package hosting + signing (resolved): CI (.github/workflows/publish-image.yml) builds
# ghcr.io/industrial-aiops/iaiops:<version>-<profile> (cosign-signed), assembles this descriptor +
# the deploy-ready compose into iaiops-margo-package-<version>.tar.gz, cosign-signs the tarball,
# and attaches both to the GitHub release. Verify key: deploy/margo/cosign.pub (keyLocation).
#
# Remaining genuine `待核实`: the secret-parameter flag pending #145. iaiops has NOT been run
# through the conformance toolkit, so it is still NOT Margo-compliant. See ../../docs/MARGO-ALIGNMENT.md.
apiVersion: margo.org/v1-alpha1
kind: ApplicationDescription
id: io-github-industrial-aiops-iaiops
metadata:
  name: Industrial-AIOps
  description: >-
    Vendor-neutral, read-first OT data tap across ~14 field protocols with a cross-protocol
    root-cause brain, exposed as governed MCP tools (audit / budget / risk-tier / undo + MOC
    gating on the few writes). Air-gap friendly.
  version: "0.19.0"
  catalog:
    application:
      tagline: Governed OT read tap + cross-protocol RCA, as MCP tools
      site: https://github.com/industrial-aiops/industrial-aiops
      tags: ["ot", "iiot", "diagnostics", "mcp", "read-only"]
    author:
      - name: wei
        email: zhouwei008@gmail.com
    organization:
      - name: Industrial-AIOps (independent)
        site: https://github.com/industrial-aiops

deploymentProfiles:
  - type: compose
    id: iaiops-compose
    description: >-
      Single hardened, non-root container (read-only rootfs; outbound-only to the operator-configured
      OT endpoints, with ONE IP-allowlisted inbound port for the MCP tool interface — not an OT
      listener). The OCI image is referenced inside the signed compose archive built from
      deploy/margo/compose.yaml.
    components:
      - name: iaiops
        properties:
          # Signed package (built + attached to the release by CI; version kept in sync with
          # pyproject.toml by tests/test_margo_package.py). Detached signature at the same URL + .sig.
          packageLocation: https://github.com/industrial-aiops/industrial-aiops/releases/download/v0.19.0/iaiops-margo-package-0.19.0.tar.gz
          # Cosign public key (verify: cosign verify-blob --key … --signature <pkg>.sig <pkg>).
          keyLocation: https://raw.githubusercontent.com/industrial-aiops/industrial-aiops/main/deploy/margo/cosign.pub
          wait: true
          timeout: "5m00s"
    requiredResources:
      cpu:
        cores: 0.5
        architectures: [amd64, arm64]
      memory: 512Mi
      storage: 1Gi
      interfaces:
        - type: ethernet
      # NOTE: the socket transport exposes one inbound MCP port (default 8000, see compose.yaml and
      # the `mcpPort` parameter). Whether v1-alpha1 has a first-class ingress/port field on
      # requiredResources is `待核实` — if it does, declare 8000/tcp here; for now the port is
      # expressed via the deployment (compose) and the mcpPort parameter.

parameters:
  profile:
    value: factory
    targets:
      - pointer: IAIOPS_MCP        # compose profile → environment variable
        components: [iaiops]
  transport:
    value: streamable-http         # socket transport (WG-recommended); or "stdio"
    targets:
      - pointer: IAIOPS_MCP_TRANSPORT
        components: [iaiops]
  mcpPort:
    value: "8000"                  # inbound MCP tool-interface port (socket transport only)
    targets:
      - pointer: IAIOPS_MCP_PORT
        components: [iaiops]
  allowlistIps:
    value: 127.0.0.1/32            # who may call the MCP port (CIDR list) — set to the orchestrator
    targets:
      - pointer: IAIOPS_ALLOWLIST_IPS
        components: [iaiops]
  masterPassword:
    # Secret parameter. The spec has no secret-typed flag yet (margo/specification#145), so this is
    # modeled as a plain parameter carrying a REFERENCE, not a value: leave it empty here and inject
    # the real value from the host/device secret facility at deploy time. iaiops itself resolves
    # every OT/IT credential from its on-box encrypted store BY NAME — secret values never travel in
    # this descriptor or the deployment spec. See ../../docs/MARGO-ALIGNMENT.md appendix B.
    value: ""
    targets:
      - pointer: IAIOPS_MASTER_PASSWORD
        components: [iaiops]

configuration:
  sections:
    - name: Edition & Access
      settings:
        - parameter: profile
          name: Edition profile
          description: Which field-protocol connectors load.
          immutable: false
          schema: profileSchema
        - parameter: transport
          name: MCP transport
          description: >-
            How the orchestrator/agent reaches the tools. "streamable-http" is a socket on mcpPort
            (WG-recommended, 2026-07-13); "stdio" pipes over the container's stdio.
          immutable: false
          schema: transportSchema
        - parameter: mcpPort
          name: MCP port
          description: Inbound port for the socket transport (ignored under stdio).
          immutable: false
          schema: portSchema
        - parameter: allowlistIps
          name: MCP client IP allowlist
          description: >-
            CIDR list allowed to call the MCP port (403 otherwise) — defense-in-depth for the
            socket transport. Set to the orchestrator/gateway address(es).
          immutable: false
          schema: allowlistSchema
        - parameter: masterPassword
          name: Secret-store master password
          description: >-
            Unlocks the encrypted on-box secret store. 待核实: the spec has no secret-typed
            parameter yet — tracked at margo/specification#145. Carried as a reference (inject the
            value from the device secret facility at deploy time), never stored in this descriptor.
          immutable: false
          schema: passwordSchema
  schema:
    # SelectValidationSchema — the five edition profiles.
    - name: profileSchema
      dataType: string
      options: [fab, factory, process, building, water]
      multiselect: false
      allowEmpty: false
    # SelectValidationSchema — the MCP transport.
    - name: transportSchema
      dataType: string
      options: [streamable-http, sse, stdio]
      multiselect: false
      allowEmpty: false
    # TextValidationSchema — TCP port.
    - name: portSchema
      dataType: string
      minLength: 1
      maxLength: 5
      allowEmpty: false
    # TextValidationSchema — CIDR allowlist.
    - name: allowlistSchema
      dataType: string
      allowEmpty: true
    # TextValidationSchema.
    - name: passwordSchema
      dataType: string
      minLength: 8
      allowEmpty: false
